<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer 🚀</title>
    <style>
        /* --- CORE STYLES --- */
        :root { 
            --space-bg: #030406; 
            --neon-blue: #4cc9f0; 
            --accent: #f72585; 
            --gold: #ffcc00; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--space-bg); 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            /* Subtle star background */
            background-image: radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 30px);
            background-size: 200px 200px;
        }
        
        h1 { 
            margin: 30px 0 5px 0; 
            color: var(--neon-blue); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            text-shadow: 0 0 15px rgba(76, 201, 240, 0.5); 
            font-size: 2.8rem; 
            text-align: center; 
        }
        
        p.subtitle { color: #888; text-align: center; margin-bottom: 40px; font-size: 1.1rem; }

        /* --- PLANET NAVIGATION GRID --- */
        #solar-system {
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 25px; 
            padding: 20px; 
            width: 100%; 
            max-width: 1000px;
            margin-bottom: 30px;
        }

        .planet-btn { 
            cursor: pointer; 
            text-align: center; 
            width: 90px; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        .planet-btn:hover { transform: translateY(-8px); }
        
        /* The CSS drawn planet icons */
        .planet-icon { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            margin: 0 auto;
            border: 3px solid transparent; 
            transition: all 0.3s ease;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.6); /* Adds 3D spherical depth */
        }
        
        .planet-btn.active .planet-icon { 
            border-color: white; 
            box-shadow: 0 0 25px var(--color1), inset -10px -10px 20px rgba(0,0,0,0.6); 
            transform: scale(1.1);
        }
        
        .planet-name { margin-top: 12px; font-weight: bold; font-size: 1rem; color: #ddd; letter-spacing: 1px;}
        .planet-btn.active .planet-name { color: white; text-shadow: 0 0 8px var(--color1); }

        /* --- DETAILED INFO CARD --- */
        #planet-card {
            width: 90%; 
            max-width: 750px; 
            background: rgba(20, 25, 35, 0.85);
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px;
            padding: 40px; 
            margin-bottom: 60px; 
            display: none; /* Hidden until clicked */
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* The large CSS drawn planet in the card */
        #big-planet-visual {
            width: 180px; 
            height: 180px; 
            border-radius: 50%; 
            margin: 0 auto 30px;
            box-shadow: inset -20px -20px 40px rgba(0,0,0,0.7), 0 0 40px rgba(255,255,255,0.1);
            transition: background 0.5s ease;
        }

        #display-name { text-align: center; font-size: 2.8rem; margin-top: 0; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px;}

        /* Stats Grid */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        
        .stat-box { 
            background: rgba(0, 0, 0, 0.4); 
            padding: 18px; 
            border-radius: 12px; 
            border-left: 4px solid var(--neon-blue); 
            transition: transform 0.2s;
        }
        .stat-box:hover { transform: translateX(5px); }
        
        .label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; display: block; margin-bottom: 8px; letter-spacing: 1px;}
        .value { font-size: 1.2rem; font-weight: bold; color: white; }
        
        /* Fact Section */
        .fact-container {
            margin-top: 30px;
            padding: 25px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .fact-title { color: var(--gold); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 10px; }
        .fact { font-style: italic; color: #ddd; line-height: 1.6; font-size: 1.1rem; margin: 0;}

        /* CSS Planet Gradients (Defining their look) */
        .gradient-sun { background: radial-gradient(circle at 30% 30%, #fffde7, #ff8c00, #d81b60); }
        .gradient-mercury { background: radial-gradient(circle at 30% 30%, #e0e0e0, #9e9e9e, #424242); }
        .gradient-venus { background: radial-gradient(circle at 30% 30%, #fdf5e6, #e6c280, #8d6e2e); }
        .gradient-earth { background: radial-gradient(circle at 30% 30%, #81d4fa, #2b6cb0, #1a365d); }
        .gradient-mars { background: radial-gradient(circle at 30% 30%, #ffbbb2, #e53e3e, #742a2a); }
        .gradient-jupiter { background: repeating-linear-gradient(0deg, #d6b89f 0px, #b08d6a 10px, #e5d3b3 20px, #937153 30px); }
        .gradient-saturn { background: radial-gradient(circle at 30% 30%, #fef0d9, #d4b886, #8b6b42); }
        .gradient-uranus { background: radial-gradient(circle at 30% 30%, #e0f7fa, #4fd1c5, #2c7a7b); }
        .gradient-neptune { background: radial-gradient(circle at 30% 30%, #7c4dff, #1e3a8a, #0c1a40); }

    </style>
</head>
<body>

    <h1>Space Explorer</h1>
    <p class="subtitle">Tap a world to launch the mission brief</p>

    <div id="solar-system"></div>

    <div id="planet-card">
        <div id="big-planet-visual"></div>
        <h2 id="display-name"></h2>
        
        <div class="stat-grid">
            <div class="stat-box" style="border-color: #ff9f1c;"><span class="label">🌡️ Temperature</span><span id="temp" class="value"></span></div>
            <div class="stat-box" style="border-color: #06d6a0;"><span class="label">🚗 Drive Time (60mph)</span><span id="car" class="value"></span></div>
            <div class="stat-box" style="border-color: #ef476f;"><span class="label">🦘 Gravity Jump</span><span id="jump" class="value"></span></div>
            <div class="stat-box" style="border-color: #118ab2;"><span class="label">🏔️ Tallest Mountain</span><span id="mtn" class="value"></span></div>
            <div class="stat-box" style="border-color: #ffd166;"><span class="label">👽 Chance of Life</span><span id="life" class="value"></span></div>
            <div class="stat-box" style="border-color: #073b4c;"><span class="label">🌕 Known Moons</span><span id="moons" class="value"></span></div>
        </div>

        <div class="fact-container">
            <div class="fact-title">Did you know?</div>
            <p class="fact" id="fact-text"></p>
        </div>
    </div>

    <script>
        // The Data
        const data = [
            { id: 'sun', name: "The Sun", gradient: "gradient-sun", color: "#ff8c00", temp: "10,000°F", car: "176 Years", jump: "N/A", mtn: "N/A", life: "0%", moons: "8 Planets", fact: "The Sun is so big that 1.3 million Earths could fit inside it! It's actually a star, not a planet." },
            { id: 'mercury', name: "Mercury", gradient: "gradient-mercury", color: "#9e9e9e", temp: "800°F", car: "61 Years", jump: "3x Higher", mtn: "1.8 miles", life: "0.1%", moons: "0", fact: "Mercury is the smallest planet and it's actually shrinking as its core cools down!" },
            { id: 'venus', name: "Venus", gradient: "gradient-venus", color: "#e6c280", temp: "867°F", car: "28 Years", jump: "0.9x (Normal)", mtn: "7 miles", life: "5%", moons: "0", fact: "Venus is the hottest planet and it spins backwards compared to all the other planets!" },
            { id: 'earth', name: "Earth", gradient: "gradient-earth", color: "#2b6cb0", temp: "59°F", car: "0 (You are here!)", jump: "1x (Normal)", mtn: "5.5 miles", life: "100%", moons: "1", fact: "Earth is the only planet we know of with liquid water on its surface and life!" },
            { id: 'mars', name: "Mars", gradient: "gradient-mars", color: "#e53e3e", temp: "-80°F", car: "53 Years", jump: "2.6x Higher", mtn: "13 miles", life: "40%", moons: "2", fact: "Mars has blue sunsets! Dust in the atmosphere scatters blue light toward anyone watching." },
            { id: 'jupiter', name: "Jupiter", gradient: "gradient-jupiter", color: "#b08d6a", temp: "-234°F", car: "420 Years", jump: "0.4x (Heavy)", mtn: "None (Gas Giant)", life: "10%", moons: "95", fact: "Jupiter is a gas giant with a storm called the Great Red Spot that is bigger than the entire Earth!" },
            { id: 'saturn', name: "Saturn", gradient: "gradient-saturn", color: "#d4b886", temp: "-288°F", car: "850 Years", jump: "0.9x (Normal)", mtn: "None (Gas Giant)", life: "5%", moons: "146", fact: "Saturn's beautiful rings aren't solid; they are made of billions of pieces of ice and rock!" },
            { id: 'uranus', name: "Uranus", gradient: "gradient-uranus", color: "#4fd1c5", temp: "-353°F", car: "1,700 Years", jump: "1.1x Higher", mtn: "None (Ice Giant)", life: "1%", moons: "28", fact: "Uranus tilts so much it actually orbits on its side, rolling around the Sun like a ball!" },
            { id: 'neptune', name: "Neptune", gradient: "gradient-neptune", color: "#1e3a8a", temp: "-353°F", car: "2,700 Years", jump: "0.9x (Normal)", mtn: "None (Ice Giant)", life: "1%", moons: "16", fact: "Neptune has the fastest winds in the solar system, reaching speeds over 1,200 mph!" }
        ];

        const system = document.getElementById('solar-system');
        const card = document.getElementById('planet-card');
        const bigVisual = document.getElementById('big-planet-visual');

        // Build the Navigation
        data.forEach((p) => {
            const btn = document.createElement('div');
            btn.className = 'planet-btn';
            // We pass the color to a CSS variable to make the glow match the planet
            btn.style.setProperty('--color1', p.color); 
            
            // The icon is now a div with a CSS gradient, NOT an image tag
            btn.innerHTML = `
                <div class="planet-icon ${p.gradient}"></div>
                <div class="planet-name">${p.name}</div>
            `;
            
            btn.onclick = () => {
                // Remove active state from all
                document.querySelectorAll('.planet-btn').forEach(node => node.classList.remove('active'));
                // Add active state to clicked
                btn.classList.add('active');
                
                // Show card
                card.style.display = 'block';
                
                // Update big visual
                bigVisual.className = ''; // reset classes
                bigVisual.classList.add(p.gradient);
                
                // Update text
                document.getElementById('display-name').innerText = p.name;
                document.getElementById('display-name').style.color = p.color;
                
                document.getElementById('temp').innerText = p.temp;
                document.getElementById('car').innerText = p.car;
                document.getElementById('jump').innerText = p.jump;
                document.getElementById('mtn').innerText = p.mtn;
                document.getElementById('life').innerText = p.life;
                document.getElementById('moons').innerText = p.moons;
                document.getElementById('fact-text').innerText = p.fact;

                // Smooth scroll down to the card
                card.scrollIntoView({behavior: 'smooth', block: 'start'});
            };
            system.appendChild(btn);
        });
    </script>
</body>
</html>
