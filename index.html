<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer 🚀</title>
    <style>
        :root { --space-bg: #030406; --neon-blue: #4cc9f0; --accent: #f72585; --gold: #ffcc00; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--space-bg); color: white; margin: 0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
        }
        h1 { margin: 30px 0; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px var(--neon-blue); font-size: 2.5rem; text-align: center; }
        
        #solar-system {
            display: flex; gap: 30px; padding: 20px; overflow-x: auto;
            width: 95%; max-width: 1200px; box-sizing: border-box; 
            scrollbar-width: none; justify-content: flex-start; /* For mobile scroll */
            margin-bottom: 40px;
        }
        /* When on a larger screen, CENTER the planets */
        @media (min-width: 800px) {
            #solar-system { justify-content: center; }
        }

        .planet-btn { flex: 0 0 auto; cursor: pointer; text-align: center; transition: 0.3s; width: 100px; }
        .planet-btn img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid transparent; transition: 0.3s; }
        .planet-btn.active img { border-color: var(--neon-blue); transform: scale(1.1); box-shadow: 0 0 25px var(--neon-blue); }
        .planet-name { margin-top: 10px; font-size: 1rem; font-weight: bold; opacity: 0.8; }

        #planet-card {
            width: 95%; max-width: 700px; background: rgba(15, 20, 30, 0.9);
            border: 2px solid var(--neon-blue); border-radius: 20px;
            padding: 30px; margin: 20px; display: none; box-shadow: 0 0 40px rgba(0,0,0,0.5);
            margin-bottom: 50px;
        }

        /* Image Gallery */
        #gallery { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-bottom: 30px; }
        #gallery img { width: 180px; height: 180px; border-radius: 12px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        #gallery img:hover { border-color: var(--neon-blue); }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .stat-box { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 12px; border-left: 3px solid var(--neon-blue); }
        .stat-label { font-size: 0.7rem; color: var(--neon-blue); text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 1.1rem; font-weight: bold; }
        
        .jump-highlight { border-left-color: var(--accent); background: rgba(247, 37, 133, 0.1); }
        .life-highlight { border-left-color: var(--gold); background: rgba(255, 204, 0, 0.05); }
        .car-highlight { border-left-color: #00ff00; background: rgba(0, 255, 0, 0.05); }

        #fun-fact { margin-top: 30px; font-style: italic; color: #ccc; border-top: 1px solid #333; padding-top: 20px; line-height: 1.6; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1>Space Explorer</h1>
    <p style="color: #888; text-align: center;">Tap a planet to launch the mission brief</p>

    <div id="solar-system"></div>

    <div id="planet-card">
        <h2 id="display-name" style="text-align:center; font-size: 2.5rem; margin-top: 0; margin-bottom: 25px; color: var(--neon-blue);"></h2>
        
        <div id="gallery"></div>

        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-label">Average Temp</div>
                <div id="temp" class="stat-value"></div>
            </div>
            <div class="stat-box car-highlight">
                <div class="stat-label">🚗 Driving Time from Earth</div>
                <div id="car" class="stat-value"></div>
            </div>
            <div class="stat-box jump-highlight">
                <div class="stat-label">Gravity Jump</div>
                <div id="jump" class="stat-value"></div>
            </div>
            <div class="stat-box life-highlight">
                <div class="stat-label">Chance of Life</div>
                <div id="life" class="stat-value"></div>
            </div>
        </div>

        <p id="fun-fact"></p>
    </div>

    <script>
        // Data with Galleries and Car Driving Times
        const planets = [
            { name: "Mercury", temp: "800°F (Day) / -290°F (Night)", car: "61 Years!", jump: "3x higher than on Earth!", life: "Extremely Low", fact: "Mercury is a planet of extremes! It has almost no atmosphere to trap heat, so the sunny side is hotter than an oven, but the shady side is colder than Antarctica!", 
              images: ["https://upload.wikimedia.org/wikipedia/commons/3/30/Mercury_in_color_-_Prockter07_centered.jpg", "https://upload.wikimedia.org/wikipedia/commons/4/4c/BepiColombo_final_Mercury_flyby.jpg"] },
            { name: "Venus", temp: "867°F (Constant)", car: "28 Years!", jump: "Almost the same as Earth.", life: "Low", fact: "On Venus, the sun rises in the West and sets in the East because the planet rotates backwards! It is the only planet that does this.", 
              images: ["https://upload.wikimedia.org/wikipedia/commons/3/36/Venussian_Atmosphere.jpg", "https://upload.wikimedia.org/wikipedia/commons/0/08/Venus_from_Mariner_10.jpg"] },
            { name: "Earth", temp: "59°F (Average)", car: "N/A (You're here!)", jump: "This is your normal jump!", life: "100% (It's us!)", fact: "You are traveling! Earth spins at about 1,000 mph, and we also zoom around the sun at a mind-blowing 67,000 mph, all while you're just sitting there!", 
              images: ["https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg", "https://upload.wikimedia.org/wikipedia/commons/a/a2/Earth_Blue_Marble_2012_July_2.jpg"] },
            { name: "Mars", temp: "-80°F", car: "53 Years!", jump: "2.6x higher!", life: "Medium", fact: "Mars is famous for Olympus Mons, the tallest volcano in the entire Solar System. At 13 miles high, it is three times taller than Mount Everest!", 
              images: ["https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg", "https://upload.wikimedia.org/wikipedia/commons/5/58/Mars_Valles_Marineris_MGS.jpg", "https://upload.wikimedia.org/wikipedia/commons/d/df/Spirit_Mars_Rover_self_portrait.jpg"] },
            { name: "Jupiter", temp: "-234°F", car: "420 Years!", jump: "You'd feel 2.5x heavier!", life: "Low", fact: "Jupiter is so big that you could fit over 1,300 Earths inside it! Its gravity is so powerful it acts like a giant protective shield for the inner planets.", 
              images: ["https://upload.wikimedia.org/wikipedia/commons/7/71/PIA21030_-_Approaching_Jupiter.jpg", "https://upload.wikimedia.org/wikipedia/commons/2/2b/Jupiter_and_its_shrunken_Great_Red_Spot.jpg", "https://upload.wikimedia.org/wikipedia/commons/5/52/Jupiter_by_Cassini-Huygens.jpg"] },
            { name: "Saturn", temp: "-288°F", car: "850 Years!", jump: "Roughly the same as Earth.", life: "Low", fact: "Saturn's rings are not solid! They are made of billions of chunks of ice and rock, ranging in size from tiny dust particles to massive, house-sized blocks.", 
              images: ["https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg", "https://upload.wikimedia.org/wikipedia/commons/a/a1/PIA17172-SaturnFullColor-Cassini-20130719.jpg", "https://upload.wikimedia.org/wikipedia/commons/2/26/Mimas%27s_Shadow_is_Cast_on_Saturn%27s_Rings.jpg"] },
            { name: "Uranus", temp: "-353°F", car: "1,700 Years!", jump: "Slightly less than Earth.", life: "Very Low", fact: "Uranus has the coldest atmosphere in the solar system, even though Neptune is further away. It's an 'Ice Giant' that rotates on its side!", 
              images: ["https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg", "https://upload.wikimedia.org/wikipedia/commons/c/c9/Uranus_in_true_and_false_color.jpg"] },
            { name: "Neptune", temp: "-353°F", car: "2,700 Years!", jump: "You'd feel heavier.", life: "Very Low", fact: "Neptune is a cold and windy world. Its winds reach speeds of 1,200 miles per hour, making them the fastest in the solar system!", 
              images: ["https://upload.wikimedia.org/wikipedia/commons/5/56/Neptune_Full.jpg", "https://upload.wikimedia.org/wikipedia/commons/d/da/Large_Storms_on_Neptune.jpg"] }
        ];

        const container = document.getElementById('solar-system');
        planets.forEach((p, index) => {
            const btn = document.createElement('div');
            btn.className = 'planet-btn';
            btn.innerHTML = `<img src="${p.images[0]}"><div class="planet-name">${p.name}</div>`;
            btn.onclick = () => {
                document.querySelectorAll('.planet-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const card = document.getElementById('planet-card');
                card.style.display = 'block';
                document.getElementById('display-name').innerText = p.name;
                document.getElementById('temp').innerText = p.temp;
                document.getElementById('car').innerText = p.car;
                document.getElementById('jump').innerText = p.jump;
                document.getElementById('life').innerText = p.life;
                document.getElementById('fun-fact').innerText = p.fact;
                
                // Build Gallery
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';
                p.images.forEach(url => {
                    const img = document.createElement('img');
                    img.src = url;
                    gallery.appendChild(img);
                });

                card.scrollIntoView({ behavior: 'smooth' });
            };
            container.appendChild(btn);
        });
    </script>
</body>
</html>
