<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer 🚀</title>
    <style>
        :root { --space-bg: #030406; --neon-blue: #4cc9f0; --accent: #f72585; --gold: #ffcc00; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--space-bg); color: white; margin: 0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: radial-gradient(white, rgba(255,255,255,.05) 1px, transparent 40px);
            background-size: 300px 300px;
        }
        h1 { margin: 30px 0 10px 0; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-blue); }
        
        /* Grid for Planets */
        #solar-system {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; 
            padding: 20px; width: 100%; max-width: 1100px;
        }
        .planet-btn { cursor: pointer; text-align: center; width: 110px; transition: 0.3s; }
        .planet-btn img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid transparent; object-fit: cover; }
        .planet-btn:hover { transform: translateY(-5px); }
        .planet-btn.active img { border-color: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); }
        .planet-name { margin-top: 10px; font-weight: bold; font-size: 0.9rem; }

        /* Info Card */
        #planet-card {
            width: 90%; max-width: 800px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-blue); border-radius: 20px;
            padding: 25px; margin: 20px; display: none; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Gallery Grid */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .gallery-container img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #444;
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { background: rgba(255, 255, 255, 0.08); padding: 12px; border-radius: 10px; border-left: 4px solid var(--neon-blue); }
        .label { font-size: 0.7rem; color: var(--neon-blue); text-transform: uppercase; display: block; margin-bottom: 3px; }
        .value { font-size: 1rem; font-weight: bold; }
        .fact { margin-top: 20px; font-style: italic; color: #ccc; border-top: 1px solid #333; padding-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

    <h1>Space Explorer</h1>
    <p style="color: #888;">Tap a world to explore our Solar System</p>

    <div id="solar-system"></div>

    <div id="planet-card">
        <h2 id="display-name" style="text-align: center; font-size: 2.2rem; margin-top: 0;"></h2>
        
        <div id="gallery" class="gallery-container">
            </div>

        <div class="stat-grid">
            <div class="stat-box"><span class="label">Temperature</span><span id="temp" class="value"></span></div>
            <div class="stat-box" style="border-left-color: #00ff00;"><span class="label">🚗 Drive Time (60mph)</span><span id="car" class="value"></span></div>
            <div class="stat-box" style="border-left-color: var(--accent);"><span class="label">Gravity Jump</span><span id="jump" class="value"></span></div>
            <div class="stat-box"><span class="label">Tallest Mountain</span><span id="mtn" class="value"></span></div>
            <div class="stat-box" style="border-left-color: var(--gold);"><span class="label">Chance Life Ever Existed</span><span id="life" class="value"></span></div>
            <div class="stat-box"><span class="label">Known Moons</span><span id="moons" class="value"></span></div>
        </div>
        <div class="fact" id="fact-text"></div>
    </div>

    <script>
        // Data with reliable Unsplash image links
        const data = [
            { 
                name: "The Sun", temp: "10,000°F", car: "176 Years", jump: "N/A", mtn: "N/A", life: "0%", moons: "8 Planets", 
                fact: "The Sun is so big that 1.3 million Earths could fit inside it! It's actually a star, not a planet.", 
                thumb: "https://images.unsplash.com/photo-1529788298508-af03678045ed?auto=format&fit=crop&w=200&q=80",
                images: [
                    "https://images.unsplash.com/photo-1529788298508-af03678045ed?auto=format&fit=crop&w=600&q=80",
                    "https://images.unsplash.com/photo-1614314107768-6018061b5b72?auto=format&fit=crop&w=600&q=80"
                ]
            },
            { 
                name: "Mercury", temp: "800°F", car: "61 Years", jump: "3x Higher", mtn: "1.8 miles", life: "0.1%", moons: "0", 
                fact: "Mercury is the smallest planet and it's actually shrinking!", 
                thumb: "https://images.unsplash.com/photo-1614730321146-b6fa6a46bac4?auto=format&fit=crop&w=200&q=80",
                images: [
                    "https://images.unsplash.com/photo-1614730321146-b6fa6a46bac4?auto=format&fit=crop&w=600&q=80",
                    "https://images.unsplash.com/photo-1543722530-d2c3201371e7?auto=format&fit=crop&w=600&q=80"
                ]
            },
            { 
                name: "Venus", temp: "867°F", car: "28 Years", jump: "Normal", mtn: "7 miles", life: "5%", moons: "0", 
                fact: "Venus is the hottest planet and it spins backwards compared to others!", 
                thumb: "https://images.unsplash.com/photo-1614313913007-2b4ae8ce32d6?auto=format&fit=crop&w=200&q=80",
                images: [
                    "https://images.unsplash.com/photo-1614313913007-2b4ae8ce32d6?auto=format&fit=crop&w=600&q=80",
                    "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=600&q=80"
                ]
            },
            { 
                name: "Earth", temp: "59°F", car: "0", jump: "Normal", mtn: "5.5 miles", life: "100%", moons: "1", 
                fact: "The only planet we know of with liquid water and life!", 
                thumb: "https://images.unsplash.com/photo-1614730321146-b6fa6a46bac4?auto=format&fit=crop&w=200&q=80",
                images: [
                    "https://images.unsplash.com/photo-1614730321146-b6fa6a46bac4?auto=format&fit=crop&w=600&q=80",
                    "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=600&q=80"
                ]
            },
            { 
                name: "Mars", temp: "-80°F", car: "53 Years", jump: "3x Higher", mtn: "13 miles", life: "40%", moons: "2", 
                fact: "Mars has blue sunsets and the solar system's biggest volcano, Olympus Mons!", 
                thumb: "https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?auto=format&fit=crop&w=200&q=80",
                images: [
                    "https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?auto=format&fit=crop&w=600&q=80",
                    "https://images.unsplash.com/photo-1543722530-d2c3201371e7?auto=format&fit=crop&w=600&q=80"
                ]
            },
            { 
                name: "Jupiter", temp: "-234°F", car: "420 Years", jump: "Heavy", mtn: "None", life: "10%", moons: "95", 
                fact: "Jupiter is a gas giant with a storm (the Red Spot) bigger than Earth!", 
                thumb: "https://images.unsplash.com/photo-1630839437035-dac17da580d0?auto=format&fit=crop&w=200&q=80",
                images: [
                    "https://images.unsplash.com/photo-1630839437035-dac17da580d0?auto=format&fit=crop&w=600&q=80",
                    "https://images.unsplash.com/photo-1614732414444-096e5f1122d5?auto=format&fit=crop&w=600&q=80"
                ]
            },
            { 
                name: "Saturn", temp: "-288°F", car: "850 Years", jump: "Normal", mtn: "None", life: "5%", moons: "146", 
                fact: "Saturn's rings are made of billions of pieces of ice!", 
                thumb: "https://images.unsplash.com/photo-1614732414444-096e5f1122d5?auto=format&fit=crop&w=200&q=80",
                images: [
                    "https://images.unsplash.com/photo-1614732414444-096e5f1122d5?auto=format&fit=crop&w=600&q=80",
                    "https://images.unsplash.com/photo-1506318137071-a8e063b4bcc0?auto=format&fit=crop&w=600&q=80"
                ]
            },
            { 
                name: "Uranus", temp: "-353°F", car: "1,700 Years", jump: "Lower", mtn: "None", life: "1%", moons: "28", 
                fact: "Uranus tilts so much it actually orbits on its side like a bowling ball!", 
                thumb: "https://images.unsplash.com/photo-1504333638930-c878732160af?auto=format&fit=crop&w=200&q=80",
                images: [
                    "https://images.unsplash.com/photo-1504333638930-c878732160af?auto=format&fit=crop&w=600&q=80",
                    "https://images.unsplash.com/photo-1614730321644-b2187abb2726?auto=format&fit=crop&w=600&q=80"
                ]
            },
            { 
                name: "Neptune", temp: "-353°F", car: "2,700 Years", jump: "Heavier", mtn: "None", life: "1%", moons: "16", 
                fact: "Neptune has winds faster than a jet plane!", 
                thumb: "https://images.unsplash.com/photo-1614314107768-6018061b5b72?auto=format&fit=crop&w=200&q=80",
                images: [
                    "https://images.unsplash.com/photo-1614314107768-6018061b5b72?auto=format&fit=crop&w=600&q=80",
                    "https://images.unsplash.com/photo-1506318137071-a8e063b4bcc0?auto=format&fit=crop&w=600&q=80"
                ]
            }
        ];

        const system = document.getElementById('solar-system');
        data.forEach((p, i) => {
            const b = document.createElement('div');
            b.className = 'planet-btn';
            b.setAttribute('data-planet', p.name);
            b.innerHTML = `<img src="${p.thumb}"><div class="planet-name">${p.name}</div>`;
            b.onclick = () => {
                document.querySelectorAll('.planet-btn').forEach(node => node.classList.remove('active'));
                b.classList.add('active');
                
                document.getElementById('planet-card').style.display = 'block';
                document.getElementById('display-name').innerText = p.name;
                document.getElementById('temp').innerText = p.temp;
                document.getElementById('car').innerText = p.car;
                document.getElementById('jump').innerText = p.jump;
                document.getElementById('mtn').innerText = p.mtn;
                document.getElementById('life').innerText = p.life;
                document.getElementById('moons').innerText = p.moons;
                document.getElementById('fact-text').innerText = p.fact;

                // Build Gallery
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';
                p.images.forEach(url => {
                    const img = document.createElement('img');
                    img.src = url;
                    gallery.appendChild(img);
                });

                document.getElementById('planet-card').scrollIntoView({behavior: 'smooth'});
            };
            system.appendChild(b);
        });
    </script>
</body>
</html>
