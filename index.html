<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer 🚀</title>
    <style>
        :root { --space-bg: #030406; --neon-blue: #4cc9f0; --accent: #f72585; --gold: #ffcc00; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--space-bg); color: white; margin: 0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 40px);
            background-size: 400px 400px;
        }
        h1 { margin: 30px 0; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px var(--neon-blue); font-size: 2.2rem; text-align: center; }
        
        #solar-system {
            display: flex; gap: 20px; padding: 20px; overflow-x: auto;
            width: 95%; max-width: 1100px; box-sizing: border-box; 
            scrollbar-width: none; margin-bottom: 30px;
        }
        @media (min-width: 900px) { #solar-system { justify-content: center; } }

        .planet-btn { flex: 0 0 auto; cursor: pointer; text-align: center; transition: 0.3s; width: 90px; }
        .planet-btn img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid transparent; object-fit: cover; background: #111; }
        .planet-btn.active img { border-color: var(--neon-blue); transform: scale(1.15); box-shadow: 0 0 20px var(--neon-blue); }
        .planet-name { margin-top: 10px; font-size: 0.9rem; font-weight: bold; color: #fff; }

        #planet-card {
            width: 95%; max-width: 700px; background: rgba(10, 15, 25, 0.95);
            border: 2px solid var(--neon-blue); border-radius: 20px;
            padding: 30px; margin: 20px 0 60px 0; display: none; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        #gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        #gallery img { width: 100%; height: 160px; border-radius: 12px; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); background: #111; }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .stat-box { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 12px; border-left: 4px solid var(--neon-blue); }
        .stat-label { font-size: 0.7rem; color: var(--neon-blue); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .stat-value { font-size: 1rem; font-weight: bold; line-height: 1.3; }
        
        .jump-highlight { border-left-color: var(--accent); background: rgba(247, 37, 133, 0.05); }
        .life-highlight { border-left-color: var(--gold); background: rgba(255, 204, 0, 0.05); }
        .car-highlight { border-left-color: #00ff00; background: rgba(0, 255, 0, 0.05); }

        #fun-fact { margin-top: 30px; font-style: italic; color: #ddd; border-top: 1px solid #333; padding-top: 20px; line-height: 1.6; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1>Space Explorer</h1>
    <p style="color: #666; text-align: center; margin-top: -20px; margin-bottom: 20px;">Mission Control: Tap a planet to begin</p>

    <div id="solar-system"></div>

    <div id="planet-card">
        <h2 id="display-name" style="text-align:center; font-size: 2.5rem; margin-top: 0; margin-bottom: 25px; color: var(--neon-blue);"></h2>
        <div id="gallery"></div>
        <div class="stat-grid">
            <div class="stat-box"><div class="stat-label">Average Temp</div><div id="temp" class="stat-value"></div></div>
            <div class="stat-box car-highlight"><div class="stat-label">🚗 Drive from Earth</div><div id="car" class="stat-value"></div></div>
            <div class="stat-box jump-highlight"><div class="stat-label">Gravity Jump</div><div id="jump" class="stat-value"></div></div>
            <div class="stat-box life-highlight"><div class="stat-label">Chance of Life</div><div id="life" class="stat-value"></div></div>
        </div>
        <p id="fun-fact"></p>
    </div>

    <script>
        const planets = [
            { name: "Mercury", temp: "800°F to -290°F", car: "61 Years", jump: "3x higher than Earth", life: "Extremely Low", fact: "Mercury is a planet of extremes! It has almost no atmosphere to trap heat, so the sunny side is hotter than an oven, but the shady side is colder than Antarctica!", 
              images: ["https://images-assets.nasa.gov/image/PIA15162/PIA15162~thumb.jpg", "https://images-assets.nasa.gov/image/PIA19422/PIA19422~thumb.jpg"] },
            { name: "Venus", temp: "867°F (Constant)", car: "28 Years", jump: "Same as Earth", life: "Low", fact: "Venus rotates backwards! It is the only planet where the sun rises in the West and sets in the East.", 
              images: ["https://images-assets.nasa.gov/image/PIA00271/PIA00271~thumb.jpg", "https://images-assets.nasa.gov/image/PIA00104/PIA00104~thumb.jpg"] },
            { name: "Earth", temp: "59°F (Average)", car: "You're Home!", jump: "Normal", life: "100%", fact: "Earth is the only planet not named after a God. We are zooming around the sun at 67,000 miles per hour right now!", 
              images: ["https://images-assets.nasa.gov/image/AS17-148-22727/AS17-148-22727~thumb.jpg", "https://images-assets.nasa.gov/image/PIA00122/PIA00122~thumb.jpg"] },
            { name: "Mars", temp: "-80°F", car: "53 Years", jump: "2.6x higher", life: "Medium", fact: "Mars is home to Olympus Mons, a volcano three times taller than Mount Everest!", 
              images: ["https://images-assets.nasa.gov/image/PIA02653/PIA02653~thumb.jpg", "https://images-assets.nasa.gov/image/PIA04591/PIA04591~thumb.jpg"] },
            { name: "Jupiter", temp: "-234°F", car: "420 Years", jump: "2.5x heavier", life: "Low", fact: "Jupiter is so big that 1,300 Earths could fit inside. Its Great Red Spot is a storm that has lasted over 300 years!", 
              images: ["https://images-assets.nasa.gov/image/PIA04866/PIA04866~thumb.jpg", "https://images-assets.nasa.gov/image/PIA22946/PIA22946~thumb.jpg"] },
            { name: "Saturn", temp: "-288°F", car: "850 Years", jump: "Same as Earth", life: "Low", fact: "Saturn is so light it would float in a giant bathtub! Its rings are made of billions of pieces of ice and rock.", 
              images: ["https://images-assets.nasa.gov/image/PIA01364/PIA01364~thumb.jpg", "https://images-assets.nasa.gov/image/PIA06077/PIA06077~thumb.jpg"] },
            { name: "Uranus", temp: "-353°F", car: "1,700 Years", jump: "Slightly less", life: "Very Low", fact: "Uranus is the only planet that rotates on its side. It's an Ice Giant with 13 faint rings!", 
              images: ["https://images-assets.nasa.gov/image/PIA01360/PIA01360~thumb.jpg", "https://images-assets.nasa.gov/image/PIA18182/PIA18182~thumb.jpg"] },
            { name: "Neptune", temp: "-353°F", car: "2,700 Years", jump: "Heavier", life: "Very Low", fact: "Neptune has supersonic winds—the fastest in the solar system, reaching 1,200 miles per hour!", 
              images: ["https://images-assets.nasa.gov/image/PIA01492/PIA01492~thumb.jpg", "https://images-assets.nasa.gov/image/PIA02210/PIA02210~thumb.jpg"] }
        ];

        const container = document.getElementById('solar-system');
        planets.forEach((p, index) => {
            const btn = document.createElement('div');
            btn.className = 'planet-btn';
            btn.innerHTML = `<img src="${p.images[0]}" onerror="this.src='https://via.placeholder.com/80/333/fff?text=Planet'"><div class="planet-name">${p.name}</div>`;
            btn.onclick = () => {
                document.querySelectorAll('.planet-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('planet-card').style.display = 'block';
                document.getElementById('display-name').innerText = p.name;
                document.getElementById('temp').innerText = p.temp;
                document.getElementById('car').innerText = p.car;
                document.getElementById('jump').innerText = p.jump;
                document.getElementById('life').innerText = p.life;
                document.getElementById('fun-fact').innerText = p.fact;
                
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';
                p.images.forEach(url => {
                    const img = document.createElement('img');
                    img.src = url;
                    img.onerror = () => img.style.display = 'none'; // Hide if broken
                    gallery.appendChild(img);
                });
                document.getElementById('planet-card').scrollIntoView({ behavior: 'smooth' });
            };
            container.appendChild(btn);
        });
    </script>
</body>
</html>
