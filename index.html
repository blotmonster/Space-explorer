<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer 🚀</title>
    <style>
        :root { --space-bg: #030406; --neon-blue: #4cc9f0; --accent: #f72585; --gold: #ffcc00; --sun-gold: #FFD700; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--space-bg); color: white; margin: 0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: radial-gradient(white, rgba(255,255,255,.12) 1px, transparent 40px);
            background-size: 350px 350px;
        }
        h1 { margin: 30px 0; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px var(--neon-blue); font-size: 2.2rem; text-align: center; }
        
        #solar-system {
            display: flex; gap: 20px; padding: 20px; overflow-x: auto;
            width: 95%; max-width: 1200px; box-sizing: border-box; 
            scrollbar-width: none; margin-bottom: 30px;
        }
        @media (min-width: 900px) { #solar-system { justify-content: center; } }

        .planet-btn { flex: 0 0 auto; cursor: pointer; text-align: center; transition: 0.3s; width: 90px; }
        
        /* Highlight the Sun with Gold */
        .planet-btn[data-planet="Sun"] img { border-color: var(--sun-gold); box-shadow: 0 0 15px var(--sun-gold); border-width: 3px; }
        .planet-btn[data-planet="Sun"] .planet-name { color: var(--sun-gold); font-weight: bold; }

        .planet-btn img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid transparent; object-fit: cover; background: #000; }
        .planet-btn.active img { border-color: var(--neon-blue); transform: scale(1.15); box-shadow: 0 0 20px var(--neon-blue); }
        .planet-name { margin-top: 10px; font-size: 0.9rem; font-weight: bold; color: #fff; }

        #planet-card {
            width: 95%; max-width: 700px; background: rgba(10, 15, 25, 0.95);
            border: 2px solid var(--neon-blue); border-radius: 20px;
            padding: 30px; margin: 20px 0 60px 0; display: none; 
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        /* Centered Hero Image */
        #gallery { text-align: center; margin-bottom: 30px; }
        #hero-img { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; border: 4px solid var(--neon-blue); box-shadow: 0 0 30px rgba(0,0,0,0.8); background: #000; }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .stat-box { background: rgba(255, 255, 255, 0.04); padding: 15px; border-radius: 12px; border-left: 4px solid var(--neon-blue); }
        .stat-label { font-size: 0.7rem; color: var(--neon-blue); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .stat-value { font-size: 1.05rem; font-weight: bold; line-height: 1.3; }
        
        .jump-highlight { border-left-color: var(--accent); background: rgba(247, 37, 133, 0.05); }
        .life-highlight { border-left-color: var(--gold); background: rgba(255, 204, 0, 0.05); }
        .car-highlight { border-left-color: #00ff00; background: rgba(0, 255, 0, 0.05); }
        .star-highlight { border-left-color: var(--sun-gold); background: rgba(255, 215, 0, 0.05); }

        #fun-fact { margin-top: 30px; font-style: italic; color: #ddd; border-top: 1px solid #333; padding-top: 20px; line-height: 1.6; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1>Space Explorer</h1>
    <p style="color: #666; text-align: center; margin-top: -20px; margin-bottom: 20px;">Mission Control: Tap the Sun or a planet to begin</p>

    <div id="solar-system"></div>

    <div id="planet-card">
        <h2 id="display-name" style="text-align:center; font-size: 2.8rem; margin-top: 0; margin-bottom: 25px; color: var(--neon-blue);"></h2>
        
        <div id="gallery">
            <img id="hero-img" src="" alt="Planet View">
        </div>

        <div class="stat-grid">
            <div id="type-box" class="stat-box star-highlight" style="display:none;">
                <div class="stat-label">Object Type</div>
                <div id="type" class="stat-value">Yellow Dwarf Star</div>
            </div>
            <div id="temp-box" class="stat-box">
                <div class="stat-label">Average Temp</div>
                <div id="temp" class="stat-value"></div>
            </div>
            <div id="car-box" class="stat-box car-highlight">
                <div class="stat-label">🚗 Drive from Earth</div>
                <div id="car" class="stat-value"></div>
            </div>
            <div id="jump-box" class="stat-box jump-highlight">
                <div class="stat-label">Gravity Jump</div>
                <div id="jump" class="stat-value"></div>
            </div>
            <div id="life-box" class="stat-box life-highlight">
                <div class="stat-label">Chance of Life</div>
                <div id="life" class="stat-value"></div>
            </div>
        </div>

        <p id="fun-fact"></p>
    </div>
