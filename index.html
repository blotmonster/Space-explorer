<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer 🚀</title>
    <style>
        :root { --space-bg: #05070a; --neon-blue: #4cc9f0; --accent: #f72585; --gold: #ffcc00; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--space-bg); color: white; margin: 0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
        }
        h1 { margin-top: 20px; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px var(--neon-blue); }
        
        #solar-system {
            display: flex; gap: 20px; padding: 30px; overflow-x: auto;
            width: 100%; box-sizing: border-box; scrollbar-width: none;
        }
        .planet-btn { flex: 0 0 auto; cursor: pointer; text-align: center; transition: 0.3s; }
        .planet-btn img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid transparent; }
        .planet-btn.active img { border-color: var(--neon-blue); transform: scale(1.2); box-shadow: 0 0 20px var(--neon-blue); }
        .planet-name { margin-top: 8px; font-size: 0.8rem; font-weight: bold; opacity: 0.8; }

        #planet-card {
            width: 90%; max-width: 550px; background: rgba(15, 20, 30, 0.9);
            border: 1px solid var(--neon-blue); border-radius: 20px;
            padding: 25px; margin: 20px; display: none; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        #hero-img { width: 180px; height: 180px; display: block; margin: 0 auto 20px; border-radius: 50%; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box { background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 12px; border-left: 3px solid var(--neon-blue); }
        .stat-label { font-size: 0.65rem; color: var(--neon-blue); text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 0.95rem; font-weight: bold; }
        
        .jump-highlight { border-left-color: var(--accent); background: rgba(247, 37, 133, 0.1); }
        .life-highlight { border-left-color: var(--gold); background: rgba(255, 204, 0, 0.05); }

        #fun-fact { margin-top: 20px; font-style: italic; color: #ccc; border-top: 1px solid #333; padding-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

    <h1>Space Explorer</h1>
    <div id="solar-system"></div>

    <div id="planet-card">
        <img id="hero-img" src="" alt="">
        <h2 id="display-name" style="text-align:center; font-size: 2rem; margin-bottom: 20px;"></h2>
        
        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-label">Average Temp</div>
                <div id="temp" class="stat-value"></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Tallest Mountain</div>
                <div id="mountain" class="stat-value"></div>
            </div>
            <div class="stat-box jump-highlight">
                <div class="stat-label">Gravity Jump</div>
                <div id="jump" class="stat-value"></div>
            </div>
            <div class="stat-box life-highlight">
                <div class="stat-label">Chance of Life</div>
                <div id="life" class="stat-value"></div>
            </div>
        </div>

        <p id="fun-fact"></p>
    </div>

    <script>
        const planets = [
            { name: "Mercury", temp: "800°F (Day) / -290°F (Night)", mountain: "Caloris Montes (1.8 miles)", jump: "You'd jump 3x higher than on Earth!", life: "Extremely Low (No atmosphere)", fact: "Mercury is shrinking! As its iron core cools, the planet gets smaller and its surface gets wrinkled.", img: "https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg" },
            { name: "Venus", temp: "867°F (Hotter than an oven!)", mountain: "Maxwell Montes (7 miles)", jump: "Almost the same as Earth.", life: "Low (Clouds might have microbes?)", fact: "On Venus, the sun rises in the West and sets in the East because it rotates backwards!", img: "https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg" },
            { name: "Earth", temp: "59°F (Average)", mountain: "Mount Everest (5.5 miles)", jump: "This is your normal jump!", life: "100% (It's us!)", fact: "Earth is the only planet not named after a Greek or Roman god. 'Earth' just means 'the ground'.", img: "https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg" },
            { name: "Mars", temp: "-80°F", mountain: "Olympus Mons (13 miles!)", jump: "You'd jump 3x higher than on Earth!", life: "Medium (Evidence of old rivers)", fact: "Mars has the biggest volcano in the solar system, Olympus Mons. It is 3 times taller than Mt. Everest!", img: "https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg" },
            { name: "Jupiter", temp: "-234°F", mountain: "None (It's a Gas Giant)", jump: "You'd feel 2.5x heavier!", life: "Low (But its moon Europa is High)", fact: "Jupiter's 'Great Red Spot' is actually a giant storm that has been blowing for over 300 years!", img: "https://upload.wikimedia.org/wikipedia/commons/2/2b/Jupiter_and_its_shrunken_Great_Red_Spot.jpg" },
            { name: "Saturn", temp: "-288°F", mountain: "None (Gas Giant)", jump: "Roughly the same as Earth.", life: "Very Low", fact: "Saturn is so light that if you found a bathtub big enough to hold it, the whole planet would float!", img: "https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg" },
            { name: "Uranus", temp: "-353°F (The Coldest)", mountain: "None (Ice Giant)", jump: "Slightly less than Earth.", life: "Very Low", fact: "Uranus is the 'sideways planet'—it tipped over long ago and now rolls around the sun like a ball.", img: "https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg" },
            { name: "Neptune", temp: "-353°F", mountain: "None (Ice Giant)", jump: "You'd feel a little heavier.", life: "Very Low", fact: "Neptune has the fastest winds in the solar system, reaching 1,200 miles per hour!", img: "https://upload.wikimedia.org/wikipedia/commons/6/63/Neptune_Full.jpg" }
        ];

        const container = document.getElementById('solar-system');
        planets.forEach((p, index) => {
            const btn = document.createElement('div');
            btn.className = 'planet-btn';
            btn.innerHTML = `<img src="${p.img}"><div class="planet-name">${p.name}</div>`;
            btn.onclick = () => {
                document.querySelectorAll('.planet-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('planet-card').style.display = 'block';
                document.getElementById('hero-img').src = p.img;
                document.getElementById('display-name').innerText = p.name;
                document.getElementById('temp').innerText = p.temp;
                document.getElementById('mountain').innerText = p.mountain;
                document.getElementById('jump').innerText = p.jump;
                document.getElementById('life').innerText = p.life;
                document.getElementById('fun-fact').innerText = p.fact;
                document.getElementById('planet-card').scrollIntoView({ behavior: 'smooth' });
            };
            container.appendChild(btn);
        });
    </script>
</body>
</html>
