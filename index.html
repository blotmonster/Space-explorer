<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer 🚀</title>
    <style>
        :root { --space-bg: #030406; --neon-blue: #4cc9f0; --accent: #f72585; --gold: #ffcc00; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--space-bg); color: white; margin: 0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: radial-gradient(white, rgba(255,255,255,.05) 1px, transparent 40px);
            background-size: 300px 300px;
        }
        h1 { margin: 30px 0 10px 0; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-blue); }
        .hint { color: #888; margin-bottom: 20px; }
        
        #solar-system {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; 
            padding: 20px; width: 100%; max-width: 1000px;
        }
        .planet-btn { cursor: pointer; text-align: center; width: 100px; transition: 0.3s; }
        .planet-btn:hover { transform: translateY(-5px); }
        
        /* This draws the "images" using code so they never break */
        .planet-thumb { 
            width: 80px; height: 80px; border-radius: 50%; margin: 0 auto;
            border: 2px solid transparent; transition: 0.3s;
            background: radial-gradient(circle at 30% 30%, var(--c1), var(--c2));
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5);
        }
        .planet-btn.active .planet-thumb { border-color: white; box-shadow: 0 0 20px var(--neon-blue); }
        .planet-name { margin-top: 10px; font-weight: bold; font-size: 0.9rem; }

        #planet-card {
            width: 90%; max-width: 600px; background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--neon-blue); border-radius: 20px;
            padding: 25px; margin: 20px; display: none; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* The big planet visual in the card */
        #big-planet-visual {
            width: 180px; height: 180px; border-radius: 50%; margin: 0 auto 20px;
            background: radial-gradient(circle at 30% 30%, var(--c1), var(--c2));
            box-shadow: inset -15px -15px 30px rgba(0,0,0,0.7), 0 0 20px rgba(255,255,255,0.1);
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { background: rgba(255, 255, 255, 0.08); padding: 12px; border-radius: 10px; border-left: 4px solid var(--neon-blue); }
        .label { font-size: 0.7rem; color: var(--neon-blue); text-transform: uppercase; display: block; margin-bottom: 3px; }
        .value { font-size: 1rem; font-weight: bold; }
        .fact { margin-top: 20px; font-style: italic; color: #ccc; border-top: 1px solid #333; padding-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

    <h1>Space Explorer</h1>
    <p class="hint">Tap a world to begin the mission</p>

    <div id="solar-system"></div>

    <div id="planet-card">
        <h2 id="display-name" style="text-align: center; font-size: 2.2rem; margin-top: 0;"></h2>
        <div id="big-planet-visual"></div>
        <div class="stat-grid">
            <div class="stat-box"><span class="label">Temperature</span><span id="temp" class="value"></span></div>
            <div class="stat-box" style="border-left-color: #00ff00;"><span class="label">🚗 Drive Time (60mph)</span><span id="car" class="value"></span></div>
            <div class="stat-box" style="border-left-color: var(--accent);"><span class="label">Gravity Jump</span><span id="jump" class="value"></span></div>
            <div class="stat-box"><span class="label">Tallest Mountain</span><span id="mtn" class="value"></span></div>
            <div class="stat-box" style="border-left-color: var(--gold);"><span class="label">Chance Life Ever Existed</span><span id="life" class="value"></span></div>
            <div class="stat-box"><span class="label">Known Moons</span><span id="moons" class="value"></span></div>
        </div>
        <div class="fact" id="fact-text"></div>
    </div>

    <script>
        // c1 is the highlight color, c2 is the shadow color
        const data = [
            { name: "The Sun", c1: "#fff000", c2: "#ff4500", temp: "10,000°F", car: "176 Years", jump: "N/A", mtn: "N/A", life: "0%", moons: "8 Planets", fact: "The Sun is so big that 1.3 million Earths could fit inside it! It's actually a star, not a planet." },
            { name: "Mercury", c1: "#e5e5e5", c2: "#555555", temp: "800°F", car: "174 Years", jump: "3x Higher", mtn: "1.8 miles", life: "0.1%", moons: "0", fact: "Mercury is the smallest planet and it's actually shrinking as its core cools!" },
            { name: "Venus", c1: "#fff9ae", c2: "#9b7021", temp: "867°F", car: "78 Years", jump: "0.9x (Normal)", mtn: "7 miles", life: "5%", moons: "0", fact: "Venus is the hottest planet and it spins backwards compared to others!" },
            { name: "Earth", c1: "#4fb2ff", c2: "#1c3d5a", temp: "59°F", car: "0", jump: "1x (Normal)", mtn: "5.5 miles", life: "100%", moons: "1", fact: "The only planet we know of with liquid water and life! It's our 'Blue Marble'." },
            { name: "Mars", c1: "#ff765e", c2: "#7a1c0a", temp: "-80°F", car: "266 Years", jump: "2.6x Higher", mtn: "13 miles", life: "40%", moons: "2", fact: "Mars has blue sunsets! Dust in the atmosphere scatters blue light toward you." },
            { name: "Jupiter", c1: "#e3bb76", c2: "#5e4222", temp: "-234°F", car: "742 Years", jump: "0.4x (Heavy)", mtn: "None", life: "10%", moons: "95", fact: "Jupiter is a gas giant with a storm (the Red Spot) bigger than the entire Earth!" },
            { name: "Saturn", c1: "#f4d03f", c2: "#7d6608", temp: "-288°F", car: "1,505 Years", jump: "0.9x (Normal)", mtn: "None", life: "5%", moons: "146", fact: "Saturn's beautiful rings are made of billions of pieces of ice and rock!" },
            { name: "Uranus", c1: "#d1f2fb", c2: "#3b82f6", temp: "-353°F", car: "3,200 Years", jump: "1.1x Higher", mtn: "None", life: "1%", moons: "28", fact: "Uranus tilts so much it actually orbits on its side like a bowling ball!" },
            { name: "Neptune", c1: "#5d82ff", c2: "#000080", temp: "-353°F", car: "5,100 Years", jump: "0.9x (Normal)", mtn: "None", life: "1%", moons: "16", fact: "Neptune has winds faster than a jet plane, reaching over 1,200 mph!" }
        ];

        const system = document.getElementById('solar-system');
        data.forEach((p, i) => {
            const b = document.createElement('div');
            b.className = 'planet-btn';
            b.style.setProperty('--c1', p.c1);
            b.style.setProperty('--c2', p.c2);
            b.innerHTML = `<div class="planet-thumb"></div><div class="planet-name">${p.name}</div>`;
            b.onclick = () => {
                document.querySelectorAll('.planet-btn').forEach(node => node.classList.remove('active'));
                b.classList.add('active');
                document.getElementById('planet-card').style.display = 'block';
                document.getElementById('display-name').innerText = p.name;
                
                const visual = document.getElementById('big-planet-visual');
                visual.style.setProperty('--c1', p.c1);
                visual.style.setProperty('--c2', p.c2);
                
                document.getElementById('temp').innerText = p.temp;
                document.getElementById('car').innerText = p.car;
                document.getElementById('jump').innerText = p.jump;
                document.getElementById('mtn').innerText = p.mtn;
                document.getElementById('life').innerText = p.life;
                document.getElementById('moons').innerText = p.moons;
                document.getElementById('fact-text').innerText = p.fact;
                document.getElementById('planet-card').scrollIntoView({behavior: 'smooth'});
            };
            system.appendChild(b);
        });
    </script>
</body>
</html>
